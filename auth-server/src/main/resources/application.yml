# ── Shared configuration (applies to every profile) ──────────────────────────
# `dev` is the default profile, so a bare `mvn spring-boot:run` (no profile set)
# runs as dev with email sending enabled.
spring:
  profiles:
    default: dev
  application:
    name: auth-server
  datasource:
    url: ${MYSQL_AUTH_SERVER_DB_URL:jdbc:mysql://localhost:3307/auth-server-db}
    username: ${MYSQL_AUTH_SERVER_ROOT_USERNAME}
    password: ${MYSQL_AUTH_SERVER_ROOT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    # No defaults: the JavaMailSender is auto-configured in every profile, so these
    # credentials must be provided as env/JVM vars in every environment (including CI,
    # which carries them as GitHub secrets) — a missing value fails fast at startup.
    # Note the Actuator mail health indicator opens a real SMTP connection on each
    # /actuator/health call, so the credentials must be valid wherever health is polled.
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWK_URI:http://localhost:9000/oauth2/jwks}

server:
  port: ${SERVER_PORT:9000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

remember-me:
  key: ${REMEMBER_ME_KEY:dev-remember-me-key-change-in-prod}
  token-validity-seconds: ${REMEMBER_ME_TOKEN_VALIDITY_SECONDS:1209600}

web-client:
  location: ${WEB_CLIENT_LOCATION:http://localhost:3000}

# Swagger/OpenAPI docs are dev-only: disabled here so every profile fails closed,
# re-enabled solely in the dev document below. Both flags are needed — api-docs
# covers /v3/api-docs, swagger-ui covers /swagger-ui/**.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── dev (default) ─────────────────────────────────────────────────────────────
# The JavaMailSender is still built (auto-config runs in every profile), but email
# is off in dev: instead the OTT/magic-link token values are logged at INFO so they
# can be copied from the console without an inbox.
---
spring:
  config:
    activate:
      on-profile: dev
emailSender:
  enabled: false
  logToken: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# ── test (activated in CI; disables outbound email) ──────────────────────────
# The JavaMailSender is built here too; emailSender.enabled=false stops actual sends.
# CI supplies SPRING_MAIL_USERNAME/PASSWORD as secrets so the bean and the Actuator
# mail health check have valid credentials.
---
spring:
  config:
    activate:
      on-profile: test
emailSender:
  enabled: false
  logToken: false

# ── qa (placeholder until a deploy target exists) ─────────────────────────────
---
spring:
  config:
    activate:
      on-profile: qa
emailSender:
  enabled: true
  logToken: false

# ── prod (placeholder until a deploy target exists) ───────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod
emailSender:
  enabled: true
  logToken: false
