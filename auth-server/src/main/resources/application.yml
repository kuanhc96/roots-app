spring:
  application:
    name: auth-server
  datasource:
    url: ${MYSQL_AUTH_SERVER_DB_URL:jdbc:mysql://localhost:3307/auth-server-db}
    username: ${MYSQL_AUTH_SERVER_ROOT_USERNAME}
    password: ${MYSQL_AUTH_SERVER_ROOT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${SERVER_PORT:9000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

web-client:
  client-secret: ${WEB_CLIENT_SECRET}
  redirect-uri: ${WEB_CLIENT_REDIRECT_URI:http://localhost:3000}
