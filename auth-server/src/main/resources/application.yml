# ── Shared configuration (applies to every profile) ──────────────────────────
# `dev` is the default profile, so a bare `mvn spring-boot:run` (no profile set)
# runs as dev with email sending enabled.
spring:
  profiles:
    default: dev
  application:
    name: auth-server
  datasource:
    url: ${MYSQL_AUTH_SERVER_DB_URL:jdbc:mysql://localhost:3307/auth-server-db}
    username: ${MYSQL_AUTH_SERVER_ROOT_USERNAME}
    password: ${MYSQL_AUTH_SERVER_ROOT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    # No defaults: the JavaMailSender is auto-configured in every profile, so these
    # credentials must be provided as env/JVM vars in every environment (including CI,
    # which carries them as GitHub secrets) — a missing value fails fast at startup.
    # Note the Actuator mail health indicator opens a real SMTP connection on each
    # /actuator/health call, so the credentials must be valid wherever health is polled.
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWK_URI:http://localhost:9000/oauth2/jwks}
  data:
    redis:
      # Backs only the Google Sign-In oauth_state store (GoogleAuthorizeService) — the
      # HttpSession itself stays in-memory. auth-server-redis is a dedicated instance
      # (docker-compose), listening on 6380 (not Redis's default 6379) to avoid a port
      # clash with bff-server-redis when both run on the same docker network.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

server:
  port: ${SERVER_PORT:9000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

remember-me:
  key: ${REMEMBER_ME_KEY:dev-remember-me-key-change-in-prod}
  token-validity-seconds: ${REMEMBER_ME_TOKEN_VALIDITY_SECONDS:1209600}

web-client:
  location: ${WEB_CLIENT_LOCATION:http://localhost:3000}

# This server's own externally reachable base URL — what the browser can hit. Used to
# build the Google redirect_uri (see AuthFlowController.GOOGLE_CALLBACK_PATH), which
# must byte-for-byte match a redirect URI registered in Google Cloud Console.
auth-server:
  external-location: ${AUTH_SERVER_EXTERNAL_LOCATION:http://localhost:9000}

# Google Sign-In. client-id is the expected `aud` of incoming Google id_tokens
# (GoogleIdTokenVerifier) and is also sent when kicking off the authorize redirect —
# public information, so a dev default is safe; override with GOOGLE_CLIENT_ID.
# client-secret has no default (required in every profile, same fail-fast convention
# as SPRING_MAIL_*): used server-side only, for the authorization-code token exchange
# (SocialLoginService) — it never reaches the browser now that the exchange moved
# out of the frontend bundle.
google:
  client-id: ${GOOGLE_CLIENT_ID:444329721662-9ftcduffg48hg91douoq4tnaok5h266r.apps.googleusercontent.com}
  client-secret: ${GOOGLE_CLIENT_SECRET}

# Swagger/OpenAPI docs are dev-only: disabled here so every profile fails closed,
# re-enabled solely in the dev document below. Both flags are needed — api-docs
# covers /v3/api-docs, swagger-ui covers /swagger-ui/**.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── dev (default) ─────────────────────────────────────────────────────────────
# The JavaMailSender is still built (auto-config runs in every profile), but email
# is off in dev: instead the OTT/magic-link token values are logged at INFO so they
# can be copied from the console without an inbox.
---
spring:
  config:
    activate:
      on-profile: dev
emailSender:
  enabled: false
  logToken: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# ── test (activated in CI; disables outbound email) ──────────────────────────
# The JavaMailSender is built here too; emailSender.enabled=false stops actual sends.
# CI supplies SPRING_MAIL_USERNAME/PASSWORD as secrets so the bean and the Actuator
# mail health check have valid credentials.
---
spring:
  config:
    activate:
      on-profile: test
emailSender:
  enabled: false
  logToken: false

# ── qa (placeholder until a deploy target exists) ─────────────────────────────
---
spring:
  config:
    activate:
      on-profile: qa
emailSender:
  enabled: true
  logToken: false

# ── prod (placeholder until a deploy target exists) ───────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod
emailSender:
  enabled: true
  logToken: false
