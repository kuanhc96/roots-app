# ── Shared configuration (applies to every profile) ──────────────────────────
# `dev` is the default profile, so a bare `mvn spring-boot:run` (no profile set)
# runs as dev with email sending enabled.
spring:
  profiles:
    default: dev
  application:
    name: auth-server
  datasource:
    url: ${MYSQL_AUTH_SERVER_DB_URL:jdbc:mysql://localhost:3307/auth-server-db}
    username: ${MYSQL_AUTH_SERVER_ROOT_USERNAME}
    password: ${MYSQL_AUTH_SERVER_ROOT_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    # Gmail credentials are only needed when emailSender.enabled=true (dev/qa/prod).
    # The `:noop` defaults let the test profile boot the JavaMailSender bean without
    # real secrets — no mail is ever sent under test.
    username: ${SPRING_MAIL_USERNAME:noop}
    password: ${SPRING_MAIL_PASSWORD:noop}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWK_URI:http://localhost:9000/oauth2/jwks}

server:
  port: ${SERVER_PORT:9000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

remember-me:
  key: ${REMEMBER_ME_KEY:dev-remember-me-key-change-in-prod}
  token-validity-seconds: ${REMEMBER_ME_TOKEN_VALIDITY_SECONDS:1209600}

web-client:
  location: ${WEB_CLIENT_LOCATION:http://localhost:3000}

# ── dev (default) ─────────────────────────────────────────────────────────────
# Email is off in dev; instead the OTT/magic-link token values are logged at INFO
# so they can be copied from the console without an inbox.
---
spring:
  config:
    activate:
      on-profile: dev
emailSender:
  enabled: false
  logToken: true

# ── test (activated in CI; disables outbound email) ──────────────────────────
---
spring:
  config:
    activate:
      on-profile: test
emailSender:
  enabled: false
  logToken: false

# ── qa (placeholder until a deploy target exists) ─────────────────────────────
---
spring:
  config:
    activate:
      on-profile: qa
emailSender:
  enabled: true
  logToken: false

# ── prod (placeholder until a deploy target exists) ───────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod
emailSender:
  enabled: true
  logToken: false
