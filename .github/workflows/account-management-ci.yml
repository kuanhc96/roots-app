name: Account Management CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'account-management/src/**'
      - 'account-management/pom.xml'

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # The unit tests (com.roots.account_management.unit.*) are pure Mockito / standalone
      # MockMvc — no DB or running services — so run them first as a fast gate, before
      # anything is built or booted.
      - name: Run unit tests
        working-directory: account-management
        run: mvn test '-Dtest=%regex[.*unit.*]'

      # auth-server is an unchanged dependency for this workflow (the paths filter means a
      # triggering PR only touched account-management), so pull its published :latest image
      # rather than rebuilding it. The auth-server image repo is private, so authenticate.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # account-management is the subject of this PR, so build its image from the PR source.
      # package -DskipTests compiles main + test sources (the integration tests run later
      # via surefire:test) and produces the jar; jib:dockerBuild then builds the image
      # straight into the local Docker daemon (no registry push).
      - name: Build account-management jar and test classes
        working-directory: account-management
        run: mvn package -DskipTests
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}

      - name: Build account-management image
        working-directory: account-management
        run: mvn jib:dockerBuild -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/account-management:ci

      # Bring up DB + auth-server + account-management on the shared docker network. The DB
      # self-seeds from initialize_db/ (mounted into /docker-entrypoint-initdb.d). depends_on
      # chains in the DB and auth-server (pulled :latest); account-management uses the local
      # :ci image. --wait blocks until all are healthy, so no curl wait-loops are needed.
      # SPRING_MAIL_* are supplied for auth-server's mail bean + Actuator mail health check.
      - name: Start services
        run: docker compose up -d --wait account-management
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          ACCOUNT_MANAGEMENT_TAG: ci
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}

      # The test client runs on the host and hits the published ports (localhost:8082 and
      # localhost:9000). Scoped to the integration package — the unit tests already ran as
      # the gate above, and no host-run test touches the DB.
      - name: Run integration tests
        working-directory: account-management
        run: mvn surefire:test '-Dtest=%regex[.*integration.*]'

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
