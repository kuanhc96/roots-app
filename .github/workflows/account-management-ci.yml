name: Account Management CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'account-management/src/**'
      - 'account-management/pom.xml'

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_DATABASE: auth-server-db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # The unit tests (com.roots.account_management.unit.*) are pure Mockito / standalone
      # MockMvc — no DB or running services — so run them first as a fast gate, before
      # anything is built or booted. Uses `mvn test` (not surefire:test) so it compiles the
      # sources itself; the regex selects only the unit package, skipping the integration
      # tests and the @SpringBootTest context-load test (which need the DB/services below).
      - name: Run unit tests
        working-directory: account-management
        run: mvn test '-Dtest=%regex[.*unit.*]'

      # The integration tests need the shared auth-server DB: the user_credential/role
      # tables that account-management writes to, and the INTEGRATION_TEST_CLIENT seeded
      # in create_client_table.sql (which issues the client_credentials token). Seed the
      # full auth-server schema so auth-server itself boots cleanly too.
      - name: Seed database
        run: |
          mysql -h 127.0.0.1 -u ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }} -p${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }} auth-server-db < auth-server/src/main/resources/initialize_db/create_authentication_tables.sql
          mysql -h 127.0.0.1 -u ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }} -p${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }} auth-server-db < auth-server/src/main/resources/initialize_db/create_client_table.sql
          mysql -h 127.0.0.1 -u ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }} -p${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }} auth-server-db < auth-server/src/main/resources/initialize_db/create_one_time_tokens_table.sql
          mysql -h 127.0.0.1 -u ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }} -p${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }} auth-server-db < auth-server/src/main/resources/initialize_db/initialize_test_users.sql

      # auth-server issues the client_credentials token and serves the JWK set that
      # account-management uses to validate it, so it must be running for the tests.
      - name: Build auth-server
        working-directory: auth-server
        run: mvn package -DskipTests
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_AUTH_SERVER_DB_URL: jdbc:mysql://localhost:3306/auth-server-db

      # Run auth-server under the test profile (emailSender.enabled=false): these tests
      # never drive auth-server's signup/OTT flow, so no mail is sent. The JavaMailSender
      # is still built in every profile, so SPRING_MAIL_* secrets are supplied to satisfy
      # the mail bean and the Actuator mail health indicator (matching auth-server-ci.yml).
      - name: Start auth-server
        working-directory: auth-server
        run: java -jar target/auth-server-*.jar &
        env:
          SPRING_PROFILES_ACTIVE: test
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_AUTH_SERVER_DB_URL: jdbc:mysql://localhost:3306/auth-server-db
          SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}

      - name: Wait for auth-server
        run: |
          echo "Waiting for auth-server to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:9000/actuator/health; then
              echo ""
              echo "Auth-server is ready."
              exit 0
            fi
            echo "Attempt $i/30, retrying in 5s..."
            sleep 5
          done
          echo "Auth-server failed to start within 150s."
          exit 1

      # Build with -DskipTests: this compiles the test sources (so surefire:test can run
      # them later) and produces the runnable jar, without executing the integration
      # tests before account-management is up.
      - name: Build account-management
        working-directory: account-management
        run: mvn package -DskipTests
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_AUTH_SERVER_DB_URL: jdbc:mysql://localhost:3306/auth-server-db

      - name: Start account-management
        working-directory: account-management
        run: java -jar target/account-management-*.jar &
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_AUTH_SERVER_DB_URL: jdbc:mysql://localhost:3306/auth-server-db

      - name: Wait for account-management
        run: |
          echo "Waiting for account-management to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8082/actuator/health; then
              echo ""
              echo "account-management is ready."
              exit 0
            fi
            echo "Attempt $i/30, retrying in 5s..."
            sleep 5
          done
          echo "account-management failed to start within 150s."
          exit 1

      - name: Run integration tests
        working-directory: account-management
        run: mvn surefire:test
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          MYSQL_AUTH_SERVER_DB_URL: jdbc:mysql://localhost:3306/auth-server-db
