name: BFF Server CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'bff-server/src/**'
      - 'bff-server/pom.xml'

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # auth-server is an unchanged dependency for this workflow (the paths filter means a
      # triggering PR only touched bff-server), so pull its published :latest image rather
      # than rebuilding it. The auth-server image repo is private, so authenticate.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # bff-server is the subject of this PR, so build its image from the PR source.
      # package -DskipTests compiles main + test sources (the integration tests run later
      # via surefire:test) and produces the jar; jib:dockerBuild then builds the image
      # straight into the local Docker daemon (no registry push).
      - name: Build bff-server jar and test classes
        working-directory: bff-server
        run: mvn package -DskipTests

      - name: Build bff-server image
        working-directory: bff-server
        run: mvn jib:dockerBuild -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/bff-server:ci

      # Bring up Redis + DB + auth-server + bff-server on the shared docker network.
      # depends_on chains in bff-server-redis and auth-server (pulled :latest, which chains
      # in the self-seeding DB); bff-server uses the local :ci image. --wait blocks until
      # all are healthy — the bff-server healthcheck hits /actuator/health, whose Redis
      # indicator proves the Spring Session store is reachable. SPRING_MAIL_* are supplied
      # for auth-server's mail bean + Actuator mail health check.
      - name: Start services
        run: docker compose up -d --wait bff-server
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BFF_SERVER_TAG: ci
          SPRING_PROFILES_ACTIVE: test
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}

      # The test client runs on the host and hits the published port (localhost:8083).
      - name: Run integration tests
        working-directory: bff-server
        run: mvn surefire:test '-Dtest=%regex[.*integration.*]'

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
