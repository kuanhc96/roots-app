name: auth-server CD

on:
  push:
    branches: [main]
    paths:
      - 'auth-server/src/**'
      - 'auth-server/pom.xml'
      - 'auth-server/frontend/**'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute release version
        id: version
        working-directory: auth-server
        run: |
          SNAPSHOT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE_VERSION=${SNAPSHOT_VERSION%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          RELEASE_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEXT_SNAPSHOT="${RELEASE_VERSION}-SNAPSHOT"
          echo "release=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "next_snapshot=${NEXT_SNAPSHOT}" >> $GITHUB_OUTPUT

      - name: Set pom.xml to release version
        working-directory: auth-server
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.release }} -DgenerateBackupPoms=false

      - name: Build and push Docker image
        working-directory: auth-server
        run: |
          mvn jib:build -DskipTests \
            -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/auth-server:${{ steps.version.outputs.release }} \
            -Djib.to.tags=latest

      - name: Set pom.xml to next snapshot version
        working-directory: auth-server
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.next_snapshot }} -DgenerateBackupPoms=false

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auth-server/pom.xml
          git commit -m "chore: bump auth-server to ${{ steps.version.outputs.next_snapshot }} [skip ci]"
          git push
