name: Simple Resource Server CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'simple-resource-server/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: simple-resource-server
        run: mvn test
