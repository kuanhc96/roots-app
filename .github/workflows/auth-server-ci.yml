name: Auth Server CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'auth-server/src/**'
      - 'auth-server/pom.xml'
      - 'auth-server/frontend/**'

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Fast fail gate: the frontend vitest suite runs before anything is built.
      # npm install (not npm ci) because frontend/package-lock.json is gitignored —
      # it is regenerated per platform (see CLAUDE.md).
      - name: Run frontend unit tests
        working-directory: auth-server/frontend
        run: |
          npm install
          npm run test

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # auth-server is the subject of this PR, so build its image from the PR source.
      # package -DskipTests compiles main + test sources (the integration tests run later
      # via surefire:test) and produces the jar; jib:dockerBuild then builds the image
      # straight into the local Docker daemon (no registry push).
      - name: Build auth-server jar and test classes
        working-directory: auth-server
        run: mvn package -DskipTests
        env:
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          # Frontend BUILD-TIME variable, not a server runtime var: nuxt generate bakes
          # runtimeConfig.public.googleClientSecret into the JS bundle during this mvn
          # package (frontend-maven-plugin -> npm run generate inherits this env). No
          # integration test exercises Google login; this proves the project builds with
          # the secret wired in, matching how a real image must be built.
          NUXT_PUBLIC_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Build auth-server image
        working-directory: auth-server
        run: mvn jib:dockerBuild -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/auth-server:ci

      # Bring up the DB + auth-server + account-management on the shared docker network
      # (the auth-server integration suite creates its account fixtures through
      # account-management, pulled :latest). Naming account-management scopes the up to
      # exactly those three services — a bare `up -d` would also boot every other compose
      # service (e.g. bff-server), pulling images this suite doesn't need. The DB self-seeds
      # from initialize_db/ (mounted into /docker-entrypoint-initdb.d). --wait blocks until
      # all report healthy, so no curl wait-loop is needed. auth-server itself uses the
      # local :ci image.
      # Naming account-management still scopes the up to exactly what this suite needs —
      # auth-server-redis is pulled in transitively via auth-server's depends_on, the
      # same way auth-server-db already is.
      - name: Start services
        run: docker compose up -d --wait account-management
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          AUTH_SERVER_TAG: ci
          SPRING_PROFILES_ACTIVE: test
          MYSQL_AUTH_SERVER_ROOT_USERNAME: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_USERNAME }}
          MYSQL_AUTH_SERVER_ROOT_PASSWORD: ${{ secrets.MYSQL_AUTH_SERVER_ROOT_PASSWORD }}
          SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
          # Runtime var now (not just the frontend build-time NUXT_PUBLIC_* one above) —
          # required, no default, for the server-side Google token exchange.
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # The test client runs on the host and hits the published port (localhost:9000),
      # exactly as before — test application.yml is unchanged.
      - name: Run integration tests
        working-directory: auth-server
        run: mvn surefire:test

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
