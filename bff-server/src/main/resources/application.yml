spring:
  application:
    name: bff-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8083}

auth-server:
  # Reachable from inside the deployment network; used by the server-to-server
  # RestClient. In docker this is http://auth-server:9000.
  internal-location: ${AUTH_SERVER_INTERNAL_LOCATION:http://localhost:9000}
  # Reachable from outside (i.e. by the user's browser); used in redirects the
  # browser must follow, such as the authorize kick-off. In docker the internal
  # hostname doesn't resolve for the browser, so this stays localhost:9000 there.
  external-location: ${AUTH_SERVER_EXTERNAL_LOCATION:http://localhost:9000}

web:
  client:
    id: ${WEB_CLIENT_ID:WEB_CLIENT}
    # Required, no default: must match the WEB_CLIENT client_secret seeded in
    # auth-server's oauth2_registered_client table ({noop}secret in dev).
    secret: ${WEB_CLIENT_SECRET}
    origin: ${WEB_CLIENT_ORIGIN:http://localhost:3000}

token-store:
  # TTL applied to stored refresh tokens. The refresh token is opaque (no readable
  # exp), so this mirrors auth-server's settings.token.refresh-token-time-to-live.
  refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:3600}
